name: Market Bot

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:


jobs:

  run-bot:

    permissions:
      contents: write

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install requirements
        run: |
          pip install -r requirements.txt


      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          NAVASAN_KEY: ${{ secrets.NAVASAN_KEY }}

        run: |
          python main.py
